<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="VPS Control Bot Oneclick hero">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.58" stop-color="#164e63"/>
      <stop offset="1" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="420" fill="url(#bg)"/>
  <rect x="62" y="52" width="1076" height="316" rx="24" fill="url(#panel)" stroke="#67e8f9" stroke-opacity="0.22" filter="url(#shadow)"/>
  <text x="104" y="138" fill="#ecfeff" font-family="Segoe UI, Arial, sans-serif" font-size="54" font-weight="700">VPS Control Bot Oneclick</text>
  <text x="106" y="184" fill="#bae6fd" font-family="Segoe UI, Arial, sans-serif" font-size="24">Telegram control panel, safe cleanup, service checks, one-command deployment</text>
  <rect x="105" y="230" width="560" height="58" rx="12" fill="#020617" stroke="#22d3ee" stroke-opacity="0.42"/>
  <text x="130" y="267" fill="#a7f3d0" font-family="Consolas, Menlo, monospace" font-size="22">curl -fsSL .../install.sh | sudo bash</text>
  <g transform="translate(760 102)">
    <rect width="300" height="220" rx="20" fill="#0f172a" stroke="#38bdf8" stroke-opacity="0.46"/>
    <circle cx="42" cy="40" r="14" fill="#22c55e"/>
    <text x="72" y="49" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">VPS Online</text>
    <rect x="34" y="78" width="232" height="28" rx="8" fill="#164e63"/>
    <rect x="34" y="124" width="188" height="28" rx="8" fill="#14532d"/>
    <rect x="34" y="170" width="214" height="28" rx="8" fill="#1e3a8a"/>
    <text x="48" y="99" fill="#e0f2fe" font-family="Segoe UI, Arial, sans-serif" font-size="15">CPU / Memory / Disk</text>
    <text x="48" y="145" fill="#dcfce7" font-family="Segoe UI, Arial, sans-serif" font-size="15">Services OK</text>
    <text x="48" y="191" fill="#dbeafe" font-family="Segoe UI, Arial, sans-serif" font-size="15">Cleanup Timer</text>
  </g>
</svg>
